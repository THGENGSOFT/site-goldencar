<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Comercial - GoldenCar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        #print-area { display: none; }
        
        @media print { 
            body { background-color: white; margin: 0; padding: 0; }
            #app-area { display: none !important; }
            #print-area { 
                display: block !important; 
                width: 100%;
                color: black;
            }
            @page { margin: 1cm; }
            .print-break { page-break-inside: avoid; }
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-100 text-slate-800 font-feature-settings-['cv02','cv03','cv04']">

    <div id="app-area" class="p-4 md:p-8 max-w-5xl mx-auto">
        <div class="bg-white shadow-xl rounded-xl border border-gray-200 overflow-hidden">
            
            <div class="bg-slate-900 text-white p-6 border-b-4 border-amber-500">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-20 h-20 bg-white rounded-lg p-1 shrink-0 overflow-hidden flex items-center justify-center">
                            <img src="assets/img/logo.jpg" alt="Logo GoldenCar" class="max-w-full max-h-full object-contain" onerror="this.style.display='none'; console.log('Imagem logo.jpg não encontrada na pasta.');">
                        </div>
                        <div>
                            <h1 class="text-3xl font-bold tracking-tight">GoldenCar</h1>
                            <p class="text-amber-400 text-xs font-semibold uppercase tracking-widest mt-1">Sanjoart Reparação de Veículos Automotores LTDA</p>
                            <p class="text-gray-400 text-xs mt-1">CNPJ: 04.776.507/0001-92</p>
                        </div>
                    </div>
                    
                    <div class="text-right w-full md:w-auto">
                        <div class="bg-slate-800 p-3 rounded border border-slate-700 flex flex-col items-end">
                            <label for="num_orcamento" class="text-xs text-gray-400 mb-1">Nº da Proposta (Editável)</label>
                            <input type="text" id="num_orcamento" class="bg-slate-700 text-amber-400 font-mono font-bold text-lg text-right w-40 px-2 py-1 rounded border border-transparent focus:border-amber-500 outline-none transition" value="">
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 space-y-8">
                
                <section>
                    <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                        <span class="bg-amber-500 w-1.5 h-5 rounded-full"></span> Identificação do Cliente
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Nome / Razão Social *</label>
                            <input type="text" id="cliente_nome" placeholder="Ex: Localiza Rent a Car S.A." class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">CPF / CNPJ</label>
                            <input type="text" id="cliente_doc" placeholder="00.000.000/0001-00" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">WhatsApp / Contato</label>
                            <input type="text" id="cliente_contato" placeholder="(41) 90000-0000" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 transition">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Endereço Completo</label>
                            <input type="text" id="cliente_endereco" placeholder="Rua, Número, Bairro, Cidade/UF" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 transition">
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                        <span class="bg-amber-500 w-1.5 h-5 rounded-full"></span> Informações do Veículo
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Marca / Modelo *</label>
                            <input type="text" id="veiculo_modelo" placeholder="Ex: Jeep Renegade Longitude" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Placa</label>
                            <input type="text" id="veiculo_placa" placeholder="ABC-1234" class="w-full p-2.5 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 uppercase transition">
                        </div>
                    </div>
                </section>

                <section>
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 border-b pb-2 gap-4">
                        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                            <span class="bg-amber-500 w-1.5 h-5 rounded-full"></span> Detalhamento dos Serviços
                        </h2>
                        
                        <div class="flex gap-2 w-full md:w-auto">
                            <select id="catalogo-master" class="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none bg-gray-50 text-xs font-semibold">
                                <option value="" data-preco="0">-- CATÁLOGO COMPLETO --</option>
                                
                                <optgroup label="1. Funilaria e Pintura (Por Peça)">
                                    <option value="Pintura de Para-choque (Dianteiro/Traseiro)" data-preco="450">Pintura de Para-choque</option>
                                    <option value="Recuperação de Para-choque (+ solda plástica)" data-preco="250">Recuperação de Para-choque</option>
                                    <option value="Pintura de Capô" data-preco="600">Pintura de Capô</option>
                                    <option value="Pintura de Teto" data-preco="650">Pintura de Teto</option>
                                    <option value="Pintura de Porta (Externa)" data-preco="500">Pintura de Porta (Unit.)</option>
                                    <option value="Pintura de Para-lama (Dianteiro/Traseiro)" data-preco="450">Pintura de Para-lama</option>
                                    <option value="Pintura de Tampa de Porta-malas" data-preco="500">Pintura de Tampa de Porta-malas</option>
                                    <option value="Pintura de Retrovisor / Maçaneta" data-preco="150">Pintura de Retrovisor/Maçaneta</option>
                                    <option value="Pintura de Aro/Roda (Liga Leve)" data-preco="150">Pintura de Aro/Roda (Unit.)</option>
                                    <option value="Pintura de Painel Frontal / Saia Lateral" data-preco="300">Pintura Frontal/Saia</option>
                                </optgroup>

                                <optgroup label="2. Martelinho de Ouro (PDR)">
                                    <option value="Remoção de Pequeno Amassado (Porta/Lateral)" data-preco="150">Amassado Pequeno (Totó)</option>
                                    <option value="Remoção de Amassado em Vinco" data-preco="250">Amassado em Vinco</option>
                                    <option value="Recuperação de Granizo" data-preco="0">Recuperação Granizo (Avaliar)</option>
                                    <option value="Martelinho em Peças de Alumínio" data-preco="300">Martelinho (Alumínio)</option>
                                </optgroup>

                                <optgroup label="3. Estética Automotiva">
                                    <option value="Polimento Comercial (Brilho/Oxidação)" data-preco="250">Polimento Comercial</option>
                                    <option value="Polimento Técnico (Corte, Refino e Lustro)" data-preco="450">Polimento Técnico</option>
                                    <option value="Cristalização / Selante (Proteção 6 meses)" data-preco="350">Cristalização / Selante</option>
                                    <option value="Vitrificação de Pintura (Proteção Cerâmica)" data-preco="800">Vitrificação de Pintura</option>
                                    <option value="Revitalização de Faróis (Par)" data-preco="120">Revitalização de Faróis</option>
                                    <option value="Higienização Interna (Bancos, carpete, teto)" data-preco="250">Higienização Interna</option>
                                </optgroup>

                                <optgroup label="4. Serviços Complementares e Peças">
                                    <option value="Montagem e Desmontagem (Taxa técnica)" data-preco="100">Taxa Montagem/Desmontagem</option>
                                    <option value="Substituição de Peça (Mão de obra instalação)" data-preco="150">Substituição de Peça</option>
                                    <option value="Custo de Material de Pintura (Insumos fixos)" data-preco="80">Material de Pintura</option>
                                </optgroup>
                            </select>
                            <button onclick="addFromCatalog()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded text-sm font-bold transition">INSERIR</button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto rounded-lg border border-gray-200">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-100 text-gray-600 uppercase text-[10px] font-bold tracking-wider">
                                <tr>
                                    <th class="p-3 border-b">Descrição do Serviço / Procedimento</th>
                                    <th class="p-3 border-b w-24 text-center">Qtd</th>
                                    <th class="p-3 border-b w-32 text-right">Unitário</th>
                                    <th class="p-3 border-b w-32 text-right">Subtotal</th>
                                    <th class="p-3 border-b w-12 text-center"></th>
                                </tr>
                            </thead>
                            <tbody id="lista-itens" class="text-sm"></tbody>
                        </table>
                    </div>
                    <button onclick="addEmptyRow()" class="mt-3 text-xs font-bold text-amber-600 hover:text-amber-700 uppercase">+ Adicionar Linha Manual</button>
                </section>

                <section class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-50 p-6 rounded-xl border border-gray-200">
                    <div class="space-y-4">
                        <h3 class="font-bold text-gray-800 uppercase text-xs tracking-widest mb-4">Termos e Prazos</h3>
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Previsão de Entrega</label>
                                <input type="text" id="cond_prazo" value="A combinar após aprovação" class="w-full p-2 border border-gray-300 rounded outline-none bg-white text-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 mb-1 uppercase">Forma de Pagamento</label>
                                <input type="text" id="cond_pgto" value="À vista / PIX / Cartão" class="w-full p-2 border border-gray-300 rounded outline-none bg-white text-sm">
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col justify-end">
                        <div class="space-y-3 bg-white p-4 rounded border border-gray-200">
                            <div class="flex justify-between text-gray-500 text-sm">
                                <span>Subtotal</span>
                                <span id="txt-subtotal">R$ 0,00</span>
                            </div>
                            <div class="flex justify-between items-center text-gray-500 text-sm">
                                <span>Desconto Comercial (%)</span>
                                <input type="number" id="desconto" value="0" oninput="calculateTotal()" class="w-16 p-1 border rounded text-right outline-none">
                            </div>
                            <div class="flex justify-between text-2xl font-black text-slate-900 pt-3 border-t">
                                <span>TOTAL</span>
                                <span id="txt-total" class="text-green-700">R$ 0,00</span>
                            </div>
                        </div>
                    </div>
                </section>

                <div class="flex flex-col md:flex-row gap-4 pt-6">
                    <button onclick="copiarWhatsApp()" class="flex-1 bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-lg transition uppercase text-sm">Copiar p/ WhatsApp</button>
                    <button onclick="enviarWhatsApp()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg transition uppercase text-sm">Enviar WhatsApp</button>
                    <button onclick="gerarPDF()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition uppercase text-sm">Gerar Proposta PDF</button>
                </div>

            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <script>
        const currencyFormat = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        window.onload = () => {
            const d = new Date();
            const numeroSugerido = `GC-${d.getFullYear().toString().substr(-2)}${(d.getMonth()+1).toString().padStart(2, '0')}-${Math.floor(1000 + Math.random() * 9000)}`;
            document.getElementById('num_orcamento').value = numeroSugerido;
            addEmptyRow();
        };

        function addFromCatalog() {
            const s = document.getElementById('catalogo-master');
            if (!s.value) return;
            createRow(s.value, 1, s.options[s.selectedIndex].getAttribute('data-preco'));
            s.value = "";
        }

        function addEmptyRow() { createRow("", 1, "0"); }

        function createRow(n, q, p) {
            const b = document.getElementById('lista-itens');
            const r = document.createElement('tr');
            r.className = "border-b hover:bg-gray-50";
            r.innerHTML = `
                <td class="p-2"><input type="text" value="${n}" class="input-nome w-full p-2 outline-none bg-transparent font-medium"></td>
                <td class="p-2"><input type="number" value="${q}" oninput="calculateTotal()" class="input-qtd w-full p-2 text-center outline-none bg-transparent" min="1"></td>
                <td class="p-2"><input type="number" step="0.01" value="${p}" oninput="calculateTotal()" class="input-valor w-full p-2 text-right outline-none bg-transparent"></td>
                <td class="p-2 text-right font-bold text-slate-700 bg-gray-50/50 cell-subtotal">R$ 0,00</td>
                <td class="p-2 text-center"><button onclick="this.parentElement.parentElement.remove(); calculateTotal();" class="text-red-400 font-bold text-xl">×</button></td>
            `;
            b.appendChild(r);
            calculateTotal();
        }

        function calculateTotal() {
            let sub = 0;
            document.querySelectorAll('#lista-itens tr').forEach(r => {
                const q = parseFloat(r.querySelector('.input-qtd').value || 1);
                const v = parseFloat(r.querySelector('.input-valor').value || 0);
                const s = q * v;
                r.querySelector('.cell-subtotal').innerText = currencyFormat.format(s);
                sub += s;
            });
            const d = parseFloat(document.getElementById('desconto').value || 0);
            const total = sub * (1 - d / 100);
            document.getElementById('txt-subtotal').innerText = currencyFormat.format(sub);
            document.getElementById('txt-total').innerText = currencyFormat.format(total);
            return { sub, total, d };
        }

        function extrair() {
            const { sub, total, d } = calculateTotal();
            let it = [];
            document.querySelectorAll('#lista-itens tr').forEach(r => {
                const n = r.querySelector('.input-nome').value.trim();
                const q = r.querySelector('.input-qtd').value;
                const v = r.querySelector('.input-valor').value;
                if(n) it.push({ n, q, v: currencyFormat.format(v), s: currencyFormat.format(q*v) });
            });
            
            const idOrcamento = document.getElementById('num_orcamento').value || "S/N";

            return {
                id: idOrcamento,
                dt: new Date().toLocaleDateString('pt-BR'),
                cli: { n: document.getElementById('cliente_nome').value, d: document.getElementById('cliente_doc').value, c: document.getElementById('cliente_contato').value, e: document.getElementById('cliente_endereco').value },
                vei: { m: document.getElementById('veiculo_modelo').value, p: document.getElementById('veiculo_placa').value },
                con: { p: document.getElementById('cond_prazo').value, g: document.getElementById('cond_pgto').value },
                fin: { sub, total, d },
                it
            };
        }

        function getWhats() {
            const data = extrair();
            let msg = `*PROPOSTA GOLDENCAR*\nNº ${data.id}\n\n*Cliente:* ${data.cli.n}\n*Veículo:* ${data.vei.m} (${data.vei.p})\n\n`;
            data.it.forEach(i => msg += `• ${i.q}x ${i.n}: *${i.s}*\n`);
            msg += `\n*TOTAL FINAL: ${currencyFormat.format(data.fin.total)}*\n\n_Prazo: ${data.con.p}_`;
            return msg;
        }

        function copiarWhatsApp() { navigator.clipboard.writeText(getWhats()).then(() => alert("Copiado!")); }
        function enviarWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(getWhats())}`, '_blank'); }

        function gerarPDF() {
            const d = extrair();
            const p = document.getElementById('print-area');
            let rows = d.it.map(i => `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 12px; font-size: 11px;">${i.n}</td>
                    <td style="padding: 12px; font-size: 11px; text-align: center;">${i.q}</td>
                    <td style="padding: 12px; font-size: 11px; text-align: right;">${i.v}</td>
                    <td style="padding: 12px; font-size: 11px; text-align: right; font-weight: bold;">${i.s}</td>
                </tr>
            `).join('');

            p.innerHTML = `
                <div style="padding: 20px; color: #1e293b;">
                    <div style="display: flex; justify-content: space-between; border-bottom: 4px solid #f59e0b; padding-bottom: 20px; margin-bottom: 30px;">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <img src="assets/img/logo.jpg" alt="Logo" style="width: 70px; height: 70px; object-fit: contain;">
                            <div>
                                <h1 style="font-size: 28px; margin: 0; color: #0f172a;">GoldenCar</h1>
                                <p style="font-size: 10px; font-weight: bold; margin: 5px 0;">SANJOART REPARAÇÃO DE VEÍCULOS AUTOMOTORES LTDA</p>
                                <p style="font-size: 10px; margin: 0;">CNPJ: 04.776.507/0001-92</p>
                                <p style="font-size: 10px; margin: 0;">Rua Rolândia 412, São José dos Pinhais, PR</p>
                            </div>
                        </div>
                        <div style="text-align: right; display: flex; flex-direction: column; justify-content: center;">
                            <h2 style="font-size: 16px; margin: 0;">ORÇAMENTO Nº ${d.id}</h2>
                            <p style="font-size: 11px; margin-top: 5px;">Data: ${d.dt}</p>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                        <div style="flex: 1; border: 1px solid #e2e8f0; padding: 15px; border-radius: 5px;">
                            <p style="font-size: 9px; font-weight: bold; color: #64748b; margin-bottom: 10px; border-bottom: 1px solid #eee;">DADOS DO CLIENTE</p>
                            <p style="font-size: 11px; margin: 3px 0;"><strong>Nome:</strong> ${d.cli.n}</p>
                            <p style="font-size: 11px; margin: 3px 0;"><strong>Documento:</strong> ${d.cli.d}</p>
                            <p style="font-size: 11px; margin: 3px 0;"><strong>Endereço:</strong> ${d.cli.e}</p>
                        </div>
                        <div style="flex: 1; border: 1px solid #e2e8f0; padding: 15px; border-radius: 5px;">
                            <p style="font-size: 9px; font-weight: bold; color: #64748b; margin-bottom: 10px; border-bottom: 1px solid #eee;">DADOS DO VEÍCULO</p>
                            <p style="font-size: 11px; margin: 3px 0;"><strong>Veículo:</strong> ${d.vei.m}</p>
                            <p style="font-size: 11px; margin: 3px 0;"><strong>Placa:</strong> ${d.vei.p.toUpperCase()}</p>
                        </div>
                    </div>

                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                        <thead><tr style="background: #f8fafc; border-bottom: 2px solid #e2e8f0; text-align: left; font-size: 9px;">
                            <th style="padding: 10px;">DESCRIÇÃO DOS SERVIÇOS</th>
                            <th style="padding: 10px; text-align: center;">QTD</th>
                            <th style="padding: 10px; text-align: right;">UNITÁRIO</th>
                            <th style="padding: 10px; text-align: right;">SUBTOTAL</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>

                    <div style="display: flex; justify-content: flex-end; margin-bottom: 50px;">
                        <div style="width: 250px; background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0;">
                            <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px;"><span>Subtotal:</span><span>${currencyFormat.format(d.fin.sub)}</span></div>
                            <div style="display: flex; justify-content: space-between; font-size: 11px; color: #ef4444;"><span>Desconto:</span><span>-${currencyFormat.format(d.fin.sub * d.fin.d / 100)}</span></div>
                            <div style="display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; margin-top: 10px; border-top: 2px solid #e2e8f0; padding-top: 10px;"><span>TOTAL:</span><span>${currencyFormat.format(d.fin.total)}</span></div>
                        </div>
                    </div>

                    <div style="font-size: 10px; color: #64748b; border: 1px solid #eee; padding: 10px; border-radius: 5px; margin-bottom: 60px;">
                        <p style="margin: 0;"><strong>Condições:</strong> Pagamento: ${d.con.g} | Prazo de Execução: ${d.con.p} | Validade: 10 dias.</p>
                        <p style="margin: 5px 0 0 0;">Proposta sujeita a alteração caso detectados danos ocultos após desmontagem.</p>
                    </div>

                    <div class="print-break" style="display: flex; justify-content: space-around; text-align: center; margin-top: 40px;">
                        <div style="width: 200px; border-top: 1px solid #334155; padding-top: 5px; font-size: 10px;"><strong>GOLDENCAR</strong><br>Responsável Técnico</div>
                        <div style="width: 200px; border-top: 1px solid #334155; padding-top: 5px; font-size: 10px;"><strong>${d.cli.n}</strong><br>De acordo / Autorização</div>
                    </div>
                </div>
            `;
            window.print();
        }
    </script>
</body>
</html>
